<!DOCTYPE html>
<html>
<head>
  <title>NEET Tracker</title>
</head>

<body>

<h1>NEET Syllabus Tracker</h1>
<h3 id="progress">Progress: 0%</h3>

<div id="tracker"></div>

<script>
const syllabus = {

Physics: [
"Units & Measurements","Motion in Straight Line","Motion in Plane",
"Laws of Motion","Work Energy Power","Circular Motion","Rotational Motion",
"Centre of Mass,Momentum and Collision","Gravitation",
"Mechanical Properties of Solids","Mechanical Properties of Fluids",
"Kinetic Theory","Thermal Properties of Matter","Thermodynamics",
"Oscillations","Waves","Electrostatics","Capacitance",
"Current Electricity","Moving Charges & Magnetism","Magnetism & Matter",
"Electromagnetic Induction","Alternating Current","Electromagnetic Waves",
"Ray Optics","Wave Optics","Dual Nature","Nuclei","Semiconductors","Atoms"
],

Chemistry: [
"Some Basic Concepts","Structure of Atom","Classification of Elements","Chemical Bonding",
"Thermodynamics","Chemical Equilibrium","Ionic Equilibrium","Redox Reactions",
"Classification and nomenclature","GOC","Isomerism","Hydrocarbons",
"Solutions","Electrochemistry","Chemical Kinetics",
"d&f block","Coordination compounds","optical Isomerism",
"Haloalkanes Haloarenes","Alcohol Phenol Ether",
"Aldehyde Ketone,Carboxylic Acids","Amines",
"Biomolecules","p-block elements","Salt analysis"
],

Botany: [
"Living World","Biological Classification","Plant Kingdom",
"Morphology of Flowering Plants","Anatomy of Flowering Plants",
"Cell Unit of Life","Cell Cycle","Photosynthesis",
"Respiration in Plants","Plant Growth",
"Sexual Reproduction in Flowering Plants",
"Principles of Inheritance","Molecular Basis of Inheritance",
"Evolution","Biotechnology Principles","Biotechnology Applications",
"Organisms and Populations","Ecosystem","Biodiversity"
],

Zoology: [
"Animal Kingdom","Structural Organisation in Animals",
"Biomolecules","Breathing and Exchange of Gases",
"Body Fluids and Circulation","Excretory Products",
"Locomotion and Movement","Neural Control and Coordination",
"Chemical Coordination","Human Reproduction","Reproductive Health",
"Human Health and Disease","Microbes in Human Welfare"
]

};

let data = JSON.parse(localStorage.getItem("neetTracker")) || {};

function render() {
  let total = 0, done = 0;
  let html = "";

  for (let subject in syllabus) {
    html += `<h2>${subject}</h2>`;

    syllabus[subject].forEach(ch => {
      total++;

      let obj = data[subject]?.[ch] || {
        notes:false, ques:false, ncert:false, done:false
      };

      if (obj.done) done++;

      html += `
        <div>
          <span>${ch}</span>

          <input type="checkbox" ${obj.notes ? "checked":""}
            onchange="toggle('${subject}','${ch}','notes')"> Notes

          <input type="checkbox" ${obj.ques ? "checked":""}
            onchange="toggle('${subject}','${ch}','ques')"> Q

          <input type="checkbox" ${obj.ncert ? "checked":""}
            onchange="toggle('${subject}','${ch}','ncert')"> NCERT

          <input type="checkbox" ${obj.done ? "checked":""}
            onchange="toggle('${subject}','${ch}','done')"> Done
        </div>
      `;
    });
  }

  document.getElementById("tracker").innerHTML = html;

  document.getElementById("progress").innerText =
    "Progress: " + Math.round((done/total)*100) + "%";
}

function toggle(sub, ch, type) {
  if (!data[sub]) data[sub] = {};
  if (!data[sub][ch]) {
    data[sub][ch] = {notes:false, ques:false, ncert:false, done:false};
  }

  data[sub][ch][type] = !data[sub][ch][type];

  let obj = data[sub][ch];

  // auto done logic
  if (obj.notes && obj.ques && obj.ncert) {
    obj.done = true;
  } else {
    obj.done = false;
  }

  localStorage.setItem("neetTracker", JSON.stringify(data));
  render();
}

render();
</script>

</body>
</html>
