<!DOCTYPE html>
<html>
<head>
  <title>NEET Tracker</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    h3 {
      text-align: center;
      margin-bottom: 30px;
      color: #94a3b8;
    }

    .subject {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      margin-bottom: 10px;
      color: #94a3b8;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      border-bottom: 1px solid #334155;
    }

    .chapter {
      flex: 2;
      font-size: 14px;
    }

    .checks {
      display: flex;
      gap: 10px;
    }

    input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .progress-bar {
      height: 6px;
      background: #334155;
      border-radius: 10px;
      margin-top: 10px;
      overflow: hidden;
    }

    .fill {
      height: 100%;
      background: #22c55e;
      width: 0%;
      transition: 0.3s;
    }
  </style>

</head>
<body>

<h1>NEET Syllabus Tracker</h1>
<h3 id="progress">Progress: 0%</h3>

<div id="tracker"></div>

<script>
const syllabus = {
Physics: ["Units & Measurements","Motion in Straight Line","Motion in Plane","Laws of Motion","Work Energy Power"],
Chemistry: ["Some Basic Concepts","Structure of Atom","Classification of Elements","Chemical Bonding"],
Botany: ["Living World","Biological Classification","Plant Kingdom"],
Zoology: ["Animal Kingdom","Structural Organisation in Animals"]
};

let data = JSON.parse(localStorage.getItem("neetTracker")) || {};

function render() {
  let total = 0, done = 0;
  let html = "";

  for (let subject in syllabus) {

    let subTotal = syllabus[subject].length;
    let subDone = 0;

    html += `<div class="subject">
      <h2>${subject}</h2>

      <div class="header">
        <div class="chapter">Chapter</div>
        <div class="checks">
          <span>Notes</span>
          <span>Q</span>
          <span>NCERT</span>
          <span>Done</span>
        </div>
      </div>
    `;

    syllabus[subject].forEach(ch => {
      total++;

      let obj = data[subject]?.[ch] || {
        notes:false, ques:false, ncert:false, done:false
      };

      if (obj.done) {
        done++;
        subDone++;
      }

      html += `
        <div class="row">
          <div class="chapter">${ch}</div>

          <div class="checks">
            <input type="checkbox" ${obj.notes ? "checked":""}
              data-sub="${subject}" data-ch="${ch}" data-type="notes">

            <input type="checkbox" ${obj.ques ? "checked":""}
              data-sub="${subject}" data-ch="${ch}" data-type="ques">

            <input type="checkbox" ${obj.ncert ? "checked":""}
              data-sub="${subject}" data-ch="${ch}" data-type="ncert">

            <input type="checkbox" ${obj.done ? "checked":""}
              data-sub="${subject}" data-ch="${ch}" data-type="done">
          </div>
        </div>
      `;
    });

    let percent = Math.round((subDone/subTotal)*100);

    html += `
      <div class="progress-bar">
        <div class="fill" style="width:${percent}%"></div>
      </div>
    </div>
    `;
  }

  document.getElementById("tracker").innerHTML = html;

  document.getElementById("progress").innerText =
    "Progress: " + Math.round((done/total)*100) + "%";

  // ✅ event listeners (no bugs)
  document.querySelectorAll("input[type=checkbox]").forEach(cb => {
    cb.addEventListener("change", () => {
      toggle(cb.dataset.sub, cb.dataset.ch, cb.dataset.type);
    });
  });
}

function toggle(sub, ch, type) {
  if (!data[sub]) data[sub] = {};
  if (!data[sub][ch]) {
    data[sub][ch] = {notes:false, ques:false, ncert:false, done:false};
  }

  data[sub][ch][type] = !data[sub][ch][type];

  let obj = data[sub][ch];

  // auto done
  obj.done = obj.notes && obj.ques && obj.ncert;

  localStorage.setItem("neetTracker", JSON.stringify(data));
  render();
}

render();
</script>

</body>
</html>
