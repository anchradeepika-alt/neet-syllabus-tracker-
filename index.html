<!DOCTYPE html>
<html>
<head>
  <title>NEET Tracker</title>
  <style>
    body { font-family: Arial; padding: 20px; background:#f5f5f5; }
    h1 { text-align:center; }
    h2 { margin-top:20px; color:#333; }
    .box { background:white; padding:15px; border-radius:10px; margin-bottom:15px; }
    label { display:block; margin:5px 0; }
  </style>
</head>
<body>

<h1>NEET Syllabus Tracker</h1>
<h3 id="progress">Progress: 0%</h3>

<div id="tracker"></div>

<script>
const syllabus = {

Physics: [
"Units & Measurements","Motion in Straight Line","Motion in Plane",
"Laws of Motion","Work Energy Power","Rotational Motion","Gravitation",
"Mechanical Properties of Solids","Mechanical Properties of Fluids",
"Thermal Properties of Matter","Thermodynamics","Kinetic Theory","Oscillations","Waves",
"Electrostatics","Current Electricity","Moving Charges & Magnetism","Magnetism & Matter",
"Electromagnetic Induction","Alternating Current","Electromagnetic Waves",
"Ray Optics","Wave Optics","Dual Nature","Atoms","Nuclei","Semiconductors"
],

Chemistry: [
"Some Basic Concepts","Structure of Atom","Classification of Elements","Chemical Bonding",
"States of Matter","Thermodynamics","Equilibrium","Redox Reactions",
"Organic Chemistry Basics","Hydrocarbons","Environmental Chemistry",
"Solid State","Solutions","Electrochemistry","Chemical Kinetics",
"Surface Chemistry","General Organic Chemistry","Haloalkanes Haloarenes",
"Alcohol Phenol Ether","Aldehyde Ketone","Carboxylic Acids","Amines",
"Biomolecules"
],

Botany: [
"Living World","Biological Classification","Plant Kingdom","Morphology of Flowering Plants",
"Anatomy of Flowering Plants","Cell Unit of Life","Cell Cycle",
"Transport in Plants","Mineral Nutrition","Photosynthesis",
"Respiration in Plants","Plant Growth",
"Reproduction in Organisms","Sexual Reproduction in Flowering Plants",
"Principles of Inheritance","Molecular Basis of Inheritance",
"Evolution","Biotechnology Principles","Biotechnology Applications",
"Organisms and Populations","Ecosystem","Biodiversity"
],

Zoology: [
"Animal Kingdom","Structural Organisation in Animals",
"Biomolecules","Digestion and Absorption","Breathing and Exchange of Gases",
"Body Fluids and Circulation","Excretory Products","Locomotion and Movement",
"Neural Control and Coordination","Chemical Coordination",
"Human Reproduction","Reproductive Health",
"Human Health and Disease","Microbes in Human Welfare"
]

};

let data = JSON.parse(localStorage.getItem("neetTracker")) || {};

function render() {
  let total = 0, done = 0;
  let html = "";

  for (let subject in syllabus) {
    html += `<div class="box"><h2>${subject}</h2>`;
    
    syllabus[subject].forEach(ch => {
      total++;
      let checked = data[subject]?.[ch] || false;
      if (checked) done++;

      html += `
        <label>
          <input type="checkbox" ${checked ? "checked" : ""}
          onchange="toggle('${subject}','${ch}')">
          ${ch}
        </label>
      `;
    });

    html += `</div>`;
  }

  document.getElementById("tracker").innerHTML = html;
  document.getElementById("progress").innerText =
    "Progress: " + Math.round((done/total)*100) + "%";
}

function toggle(sub, ch) {
  if (!data[sub]) data[sub] = {};
  data[sub][ch] = !data[sub][ch];
  localStorage.setItem("neetTracker", JSON.stringify(data));
  render();
}

render();
</script>

</body>
</html>
